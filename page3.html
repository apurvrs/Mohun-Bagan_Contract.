<!DOCTYPE html>
<html>
<head>
  <title>Performance Statistics</title>
  <style>
    body {
      background: #021b02;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      max-width: 900px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Performance & Career Statistics</h1>

    <label>Club & Academy History</label>
    <textarea rows="5">Patli Football Club (2020)
Nalanda Football Club (2021-2022)
Kumhrar Football Club (2022-2023)
The Red Tiger Football Club (2024-2025)
Fully Trained At: Nalanda Football Club (2022)</textarea>

    <label>Total Appearances</label>
    <input type="text" value="329">

    <label>Goals & Assists</label>
    <input type="text" value="127 Goals / 289 Assists">

    <label>Minutes Played</label>
    <input type="text" value="26000+">

    <label>Disciplinary Record</label>
    <textarea rows="5">Total Yellow Cards: 20
Total Red Cards: 7</textarea>

  
  </div>
</body>
</html>
