<!DOCTYPE html>
<html>
<head>
  <title>Career Journey</title>
  <style>
    body {
      margin:0;
      background:linear-gradient(to bottom,#000,#032103);
      color:white;
      font-family:Arial;
      padding:30px;
    }

    .logo {
      position:fixed;
      top:20px;
      right:20px;
      width:90px;
      border-radius:50%;
      box-shadow:0 0 25px #00ff88;
      animation:pulse 2s infinite;
    }

    @keyframes pulse {
      0% {transform:scale(1);} 
      50% {transform:scale(1.1);} 
      100% {transform:scale(1);} 
    }

    h1 {
      text-align:center;
      font-size:55px;
      color:#00ff88;
    }

    .timeline {
      max-width:900px;
      margin:auto;
    }

    .item {
      background:rgba(255,255,255,0.08);
      padding:25px;
      border-left:5px solid #00ff88;
      margin:25px 0;
      border-radius:15px;
    }
  </style>
</head>
<body>
  <img src="mohunbagan_logo.png" class="logo">

  <h1>Career Journey</h1>

  <div class="timeline">
    <div class="item">
      <h2>Patli Football Club</h2>
      <p>2020</p>
    </div>

    <div class="item">
      <h2>Nalanda Football Club</h2>
      <p>2021-2022</p>
    </div>

    <div class="item">
      <h2>Kumhrar Football Club</h2>
      <p>2022-2023</p>
    </div>

    <div class="item">
      <h2>The Red Tiger Football Club</h2>
      <p>2024-2025</p>
    </div>

    <div class="item">
      <h2>Career Stats</h2>
      <p>
        329 Appearances<br>
        127 Goals<br>
        289 Assists<br>
        26000+ Minutes Played
      </p>
    </div>
  </div>
</body>
</html>
