<!DOCTYPE html>
<html>
<head>
  <title>Professional Contract 1</title>
  <style>
    body {
      margin:0;
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .container {
      padding:40px;
      animation: fadeIn 1.2s ease;
    }

    iframe {
      width:90%;
      height:90vh;
      border:none;
      border-radius:20px;
      box-shadow:0 0 25px #00ff88;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(30px);} 
      to {opacity:1; transform:translateY(0);} 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Professional Contract Document</h1>
    <iframe src="contract1.pdf"></iframe>
  </div>
</body>
</html>
