<!DOCTYPE html>
<html>
<head>
  <title>About Abhinav</title>
  <style>
    body {
      margin:0;
      background: linear-gradient(to bottom,#021b02,#000);
      color:white;
      font-family:Arial;
      padding:30px;
    }

    @keyframes fadeUp {
      from {opacity:0; transform:translateY(40px);} 
      to {opacity:1; transform:translateY(0);} 
    }

    .box {
      max-width:900px;
      margin:auto;
      background:rgba(255,255,255,0.08);
      border-radius:25px;
      padding:40px;
      animation:fadeUp 1s ease;
      box-shadow:0 0 30px rgba(0,255,136,0.3);
    }

    .logo {
      position:fixed;
      top:20px;
      right:20px;
      width:90px;
      border-radius:50%;
      animation:float 3s infinite ease-in-out;
      box-shadow:0 0 25px #00ff88;
    }

    @keyframes float {
      0% {transform:translateY(0);} 
      50% {transform:translateY(-10px);} 
      100% {transform:translateY(0);} 
    }

    img.player {
      width:220px;
      height:220px;
      border-radius:25px;
      object-fit:cover;
      border:4px solid #00ff88;
      box-shadow:0 0 25px #00ff88;
    }

    h1 {
      color:#00ff88;
      font-size:50px;
    }

    .card {
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:18px;
      margin-top:20px;
    }
  </style>
</head>
<body>
  <img src="mohunbagan_logo.png" class="logo">

  <div class="box">
    <center>
      <img src="abhinav_photo.png" class="player">
      <h1>Abhinav Srivastava</h1>
      <h2>Indian Midfielder</h2>
    </center>

    <div class="card">
      <h2>Biography</h2>
      <p>
        Born on 9 December 2010 in Hajipur, Bihar
      </p>
    </div>

    <div class="card">
      <h2>Nationality</h2>
      <p>Indian</p>
    </div>

    
  </div>
</body>
</html>
