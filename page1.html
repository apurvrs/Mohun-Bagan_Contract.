<!DOCTYPE html>
<html>
<head>
  <title>Biography</title>
  <style>
    body {
      background: #021b02;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      max-width: 800px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <div style="text-align:center; margin-bottom:25px;">
      <img src="abhinav_photo.png" alt="Abhinav Srivastava" style="width:180px; height:180px; object-fit:cover; border-radius:20px; border:4px solid #00ff88; box-shadow:0 0 20px #00ff88;">
    </div>
    <h1>Biographical & Biography</h1>

    <label>Full Legal Name</label>
    <input type="text" value="Abhinav Srivastava">

    <label>Date of Birth</label>
    <input type="date" value="2010-12-09">

    <label>Place of Birth</label>
    <input type="text" value="Hajipur, Bihar">

    <label>Nationality</label>
    <input type="text" value="Indian">

    <button>Continue Journey</button>
  </div>
</body>
</html>
