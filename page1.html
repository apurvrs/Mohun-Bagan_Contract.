<!DOCTYPE html>
<html>
<head>
  <title>Identity Records</title>
  <style>
    body {
      background: #021b02;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      max-width: 800px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Biographical & Identity Records</h1>

    <label>Full Legal Name</label>
    <input type="text">

    <label>Date of Birth</label>
    <input type="date">

    <label>Place of Birth</label>
    <input type="text">

    <label>Nationality</label>
    <input type="text">

    <button>Save Information</button>
  </div>
</body>
</html>
