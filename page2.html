<!DOCTYPE html>
<html>
<head>
  <title>Football Profile</title>
  <style>
    body {
      margin:0;
      background:black;
      color:white;
      font-family:Arial;
      padding:30px;
    }

    .logo {
      position:fixed;
      top:20px;
      right:20px;
      width:90px;
      border-radius:50%;
      animation:rotate 5s linear infinite;
      box-shadow:0 0 25px #00ff88;
    }

    @keyframes rotate {
      from {transform:rotate(0deg);} 
      to {transform:rotate(360deg);} 
    }

    .box {
      max-width:1000px;
      margin:auto;
    }

    .stats {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:40px;
    }

    .card {
      background:#071507;
      padding:25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,255,136,0.2);
      transition:0.4s;
    }

    .card:hover {
      transform:translateY(-10px);
    }

    h1 {
      color:#00ff88;
      font-size:55px;
      text-align:center;
    }
  </style>
</head>
<body>
  <img src="mohunbagan_logo.png" class="logo">

  <div class="box">
    <h1>Football Identity</h1>

    <div class="stats">
      <div class="card">
        <h2>Position</h2>
        <p>Center Midfielder (CM)</p>
      </div>

      <div class="card">
        <h2>Dominant Foot</h2>
        <p>Right Footed</p>
      </div>

      <div class="card">
        <h2>Height</h2>
        <p>165-200 cm</p>
      </div>

      <div class="card">
        <h2>Weight</h2>
        <p>54-60 kg</p>
      </div>
      
      <div class="card">
        <h2>From:</h2>
        <p>1 April 2026- 1 Jan 2028</p>
      </div>
      
      <div class="card">
        <h2>Salary</h2>
        <p>16 Lakh</p>
      </div>
    </div>
  </div>
</body>
</html>
