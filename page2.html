<!DOCTYPE html>
<html>
<head>
  <title>Football Profile</title>
  <style>
    body {
      background: #021b02;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      max-width: 800px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Physical & Football Profile</h1>

    <label>Height (cm)</label>
    <input type="text" value="165-200 cm">

    <label>Weight (kg)</label>
    <input type="text" value="54-60 kg">

    <label>Primary Position</label>
    <input type="text" value="Center Midfielder (CM)">

    <label>Secondary Positions</label>
    <input type="text" value="N/A">

    <label>Preferred Foot</label>
    <select>
      <option selected>Right Footed</option>
      <option>Left Footed</option>
      <option>Both Footed</option>
    </select>

    <button>Continue Journey</button>
  </div>
</body>
</html>
