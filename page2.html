<!DOCTYPE html>
<html>
<head>
  <title>Football Profile</title>
  <style>
    body {
      background: #021b02;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      max-width: 800px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div style="position:fixed; top:20px; right:20px; z-index:1000;">
    <img src="mohunbagan_logo.png" alt="Mohun Bagan Logo" style="width:90px; height:90px; border-radius:50%; animation: logoFloat 3s ease-in-out infinite, logoGlow 2.5s infinite; box-shadow:0 0 25px #00ff88;">
  </div>
  <div class="box">
    <h1>Physical & Football Profile</h1>

    <label>Height (cm)</label>
    <div>
      <p>
        165-200 CM
      </p>
    </div>

    <label>Weight (kg)</label>
    <div>
      <p>
        54-60 KG
      </p>
    </div>

    <label>Primary Position</label>
    <input type="text" value="Center Midfielder (CM)">

    <label>Secondary Positions</label>
    <input type="text" value="N/A">

    <label>Preferred Foot</label>
    <select>
      <option selected>Right Footed</option>
      
  </div>
</body>
</html>
