  <title>Mohun Bagan U-17 Registration</title>
  <style>
    * {
      scroll-behavior: smooth;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #00ff88; }
      50% { box-shadow: 0 0 25px #00ff88; }
      100% { box-shadow: 0 0 10px #00ff88; }
    }

    .container, .box {
      animation: fadeUp 1.2s ease;
    }

    img:hover {
      transform: scale(1.05);
      transition: 0.4s;
    }

    button, a {
      animation: glow 3s infinite;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #001a00, #003300);
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 55px;
      color: #00ff88;
    }

    p {
      max-width: 800px;
      margin: auto;
      line-height: 1.8;
      color: #ddd;
    }

    .buttons {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    a {
      text-decoration: none;
      background: #00ff88;
      color: black;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: white;
      transform: scale(1.05);
    }
  </style>
</head>
